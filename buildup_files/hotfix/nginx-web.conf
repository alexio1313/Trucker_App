server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS — re-resolve every 10s so container IP changes don't break proxy
    # When proxy_pass uses a variable, nginx uses resolver for DNS lookups.
    # Using $request_uri passes the FULL path (nginx doesn't strip prefix with variables).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_host api_gateway;

    # SPA routing - serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend
    # Variable in proxy_pass forces per-request DNS re-resolution.
    # $request_uri sends the full original path (/api/v1/...) to the upstream.
    location /api/ {
        proxy_pass http://$api_host:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_next_upstream error timeout;
    }

    # WebSocket upgrade for live tracking
    location /socket.io/ {
        proxy_pass http://$api_host:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
