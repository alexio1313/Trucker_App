global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'truck-platform'
    environment: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API Gateway
  - job_name: 'api_gateway'
    static_configs:
      - targets: ['api_gateway:3000']
    metrics_path: /metrics

  # Load Service
  - job_name: 'load_service'
    static_configs:
      - targets: ['load_service:3001']
    metrics_path: /metrics

  # Trucker Service
  - job_name: 'trucker_service'
    static_configs:
      - targets: ['trucker_service:3002']
    metrics_path: /metrics

  # Pricing Service
  - job_name: 'pricing_service'
    static_configs:
      - targets: ['pricing_service:3003']
    metrics_path: /metrics

  # Admin Service
  - job_name: 'admin_service'
    static_configs:
      - targets: ['admin_service:3004']
    metrics_path: /metrics

  # Social Service
  - job_name: 'social_service'
    static_configs:
      - targets: ['social_service:3005']
    metrics_path: /metrics

  # PostgreSQL exporter (when added)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    metrics_path: /metrics
    scrape_interval: 30s

  # Redis exporter (when added)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: /metrics
    scrape_interval: 30s

  # Kafka exporter (when added)
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
    scrape_interval: 30s

  # RabbitMQ
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    scrape_interval: 30s
