## This file defines Deployments + Services + HPAs for all backend microservices.
## Apply with: kubectl apply -f k8s/ -n truck-platform

---
# ─── load-service ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-service
  namespace: truck-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: load-service
  template:
    metadata:
      labels:
        app: load-service
    spec:
      containers:
        - name: load-service
          image: ghcr.io/YOUR_ORG/load-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: truck-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: truck-secrets
                  key: redis-url
            - name: KAFKA_BROKERS
              value: kafka:9092
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '512Mi'
              cpu: '500m'
---
apiVersion: v1
kind: Service
metadata:
  name: load-service
  namespace: truck-platform
spec:
  selector:
    app: load-service
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: load-service-hpa
  namespace: truck-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: load-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

