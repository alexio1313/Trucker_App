# DO NOT commit real values. Use this as a template.
# Create secrets with:
#   kubectl create secret generic truck-secrets -n truck-platform \
#     --from-literal=database-url=... \
#     --from-literal=redis-url=... \
#     --from-literal=jwt-secret=... \
#     --from-literal=jwt-refresh-secret=... \
#     --from-literal=anthropic-api-key=... \
#     --from-literal=google-maps-api-key=... \
#     --from-literal=razorpay-key-id=... \
#     --from-literal=razorpay-key-secret=... \
#     --from-literal=razorpay-webhook-secret=...

apiVersion: v1
kind: Secret
metadata:
  name: truck-secrets
  namespace: truck-platform
type: Opaque
# data values are base64-encoded — use kubectl create secret, not this file directly
